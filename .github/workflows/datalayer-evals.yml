name: datalayer-evals

on:
  workflow_dispatch:
    inputs:
      evalset_spec_file:
        description: Path to evalset spec file used as the shared baseline.
        required: false
        default: evals/simple-example/simple-example.evalset.json
        type: string
      agentspec_ids:
        description: Comma-separated agentspec ids to bootstrap (multi-agentspec mode).
        required: false
        default: example-evals,example-evals-nocodemode
        type: string
      run_environments:
        description: Comma-separated run environments to execute (sdk,sdk-proxy).
        required: false
        default: sdk
        type: string
      run_limit:
        description: Runs fetched per experiment.
        required: false
        default: "3"
        type: string
      ai_agents_url:
        description: Optional AI Agents base URL override.
        required: false
        default: ""
        type: string

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}
    steps:
      - name: Build run-environment matrix
        id: build_matrix
        uses: actions/github-script@v7
        with:
          script: |
            const raw = `${{ inputs.run_environments }}` || 'sdk';
            const lanes = raw
              .split(',')
              .map((lane) => lane.trim())
              .filter(Boolean);
            const deduped = [...new Set(lanes.length ? lanes : ['sdk'])];
            const matrix = { run_environment: deduped };
            core.setOutput('matrix', JSON.stringify(matrix));
            console.log(`Resolved matrix: ${JSON.stringify(matrix)}`);

  evals:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare lane-specific evalset spec
        id: prepare_spec
        uses: datalayer/github-actions@main
        with:
          mode: prepare-spec
          evalset-spec-file: ${{ inputs.evalset_spec_file }}
          run-environment: ${{ matrix.run_environment }}
          prepared-spec-output-dir: artifacts/specs

      - name: Execute multi-agentspec eval runs
        id: execute_runs
        uses: datalayer/github-actions@main
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        with:
          mode: execute-runs
          evalset-spec-file: ${{ steps.prepare_spec.outputs.prepared-spec-path }}
          agentspec-ids: ${{ inputs.agentspec_ids }}
          api-key: ${{ secrets.DATALAYER_API_KEY }}
          run-environment: ${{ matrix.run_environment }}
          run-limit: ${{ inputs.run_limit }}
          ai-agents-url: ${{ inputs.ai_agents_url }}
          billable-account-uid: ${{ secrets.DATALAYER_BILLABLE_ACCOUNT_UID }}

      - name: Generate eval report
        id: evals
        uses: datalayer/github-actions@main
        with:
          mode: run-report
          evalset-id: ${{ steps.execute_runs.outputs.executed-evalset-id }}
          api-key: ${{ secrets.DATALAYER_API_KEY }}
          run-environment: ${{ matrix.run_environment }}
          run-limit: ${{ inputs.run_limit }}
          ai-agents-url: ${{ inputs.ai_agents_url }}
          billable-account-uid: ${{ secrets.DATALAYER_BILLABLE_ACCOUNT_UID }}
          output-markdown: artifacts/simple-example-${{ matrix.run_environment }}-report.md
          report-artifact-name: datalayer-evals-reports-${{ matrix.run_environment }}
          upload-report-artifacts: "false"
          export-csv: "true"

      - name: Upload final markdown/csv artifacts
        uses: actions/upload-artifact@v4
        with:
          name: datalayer-evals-final-reports-${{ matrix.run_environment }}
          path: |
            ${{ steps.evals.outputs.report-file }}
            ${{ steps.evals.outputs.csv-file }}
            ${{ steps.evals.outputs.log-file }}
            ${{ steps.evals.outputs.timestamped-report-file }}
            ${{ steps.evals.outputs.timestamped-csv-file }}
            ${{ steps.prepare_spec.outputs.prepared-spec-path }}

      - name: Add summary to workflow
        shell: bash
        run: |
          {
            echo "## Multi-Agentspec Evals Report"
            echo ""
            echo "- Lane: \`${{ matrix.run_environment }}\`"
            echo "- Evalset spec: \`${{ steps.prepare_spec.outputs.prepared-spec-path }}\`"
            echo "- Executed evalset id: \`${{ steps.execute_runs.outputs.executed-evalset-id }}\`"
            echo "- Agentspec ids: \`${{ inputs.agentspec_ids }}\`"
            echo "- Markdown report: \`${{ steps.evals.outputs.report-file }}\`"
            echo "- CSV report: \`${{ steps.evals.outputs.csv-file }}\`"
            echo "- Uploaded artifacts: \`datalayer-evals-reports-${{ matrix.run_environment }}\` and \`datalayer-evals-final-reports-${{ matrix.run_environment }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
