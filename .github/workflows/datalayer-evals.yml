name: datalayer-evals

on:
  workflow_dispatch:
    inputs:
      evalset_spec_file:
        description: Path to evalset spec file used as the shared baseline.
        required: false
        default: simple-example/simple-example.evalset.json
        type: string
      agentspec_ids:
        description: Comma-separated agentspec ids to bootstrap (multi-agentspec mode).
        required: false
        default: example-evals,example-evals-nocodemode
        type: string
      run_environments:
        description: Comma-separated run environments to execute (sdk,sdk-proxy).
        required: false
        default: sdk
        type: string
      run_limit:
        description: Runs fetched per experiment.
        required: false
        default: "3"
        type: string
      ai_agents_url:
        description: Optional AI Agents base URL override.
        required: false
        default: ""
        type: string

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}
    steps:
      - name: Build run-environment matrix
        id: build_matrix
        shell: bash
        env:
          RUN_ENVIRONMENTS: ${{ inputs.run_environments }}
        run: |
          python - << 'PY'
          import json
          import os

          raw = os.environ.get('RUN_ENVIRONMENTS', 'sdk')
          lanes = [lane.strip() for lane in raw.split(',') if lane.strip()]
          if not lanes:
              lanes = ['sdk']

          # Keep user order and drop duplicates.
          deduped = list(dict.fromkeys(lanes))
          matrix = {'run_environment': deduped}

          output_path = os.environ.get('GITHUB_OUTPUT', '')
          if output_path:
              with open(output_path, 'a', encoding='utf-8') as stream:
                  stream.write(f"matrix={json.dumps(matrix)}\n")

          print(f"Resolved matrix: {matrix}")
          PY

  evals:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare lane-specific evalset spec
        id: prepare_spec
        shell: bash
        env:
          INPUT_SPEC: ${{ inputs.evalset_spec_file }}
          RUN_ENVIRONMENT: ${{ matrix.run_environment }}
        run: |
          python - << 'PY'
          import json
          import os
          from pathlib import Path

          source = Path(os.environ['INPUT_SPEC'])
          run_environment = os.environ['RUN_ENVIRONMENT'].strip()
          payload = json.loads(source.read_text(encoding='utf-8'))
          payload['run_environment'] = run_environment

          out_dir = Path('artifacts/specs')
          out_dir.mkdir(parents=True, exist_ok=True)
          base = source.name.removesuffix('.evalset.json').removesuffix('.json')
          out_path = out_dir / f'{base}-{run_environment}.evalset.json'
          out_path.write_text(json.dumps(payload, indent=2) + '\n', encoding='utf-8')

          output_path = os.environ.get('GITHUB_OUTPUT', '')
          if output_path:
              with open(output_path, 'a', encoding='utf-8') as stream:
                  stream.write(f'spec_path={out_path}\n')
          print(f'Prepared spec: {out_path}')
          PY

      - name: Run multi-agentspec eval report
        id: evals
        uses: datalayer/github-actions@main
        with:
          evalset-spec-file: ${{ steps.prepare_spec.outputs.spec_path }}
          api-key: ${{ secrets.DATALAYER_API_KEY }}
          agentspec-ids: ${{ inputs.agentspec_ids }}
          run-limit: ${{ inputs.run_limit }}
          ai-agents-url: ${{ inputs.ai_agents_url }}
          billable-account-uid: ${{ secrets.DATALAYER_BILLABLE_ACCOUNT_UID }}
          output-markdown: artifacts/simple-example-${{ matrix.run_environment }}-report.md
          report-artifact-name: datalayer-evals-reports-${{ matrix.run_environment }}
          export-csv: "true"

      - name: Upload final markdown/csv artifacts
        uses: actions/upload-artifact@v4
        with:
          name: datalayer-evals-final-reports-${{ matrix.run_environment }}
          path: |
            ${{ steps.evals.outputs.report-file }}
            ${{ steps.evals.outputs.csv-file }}
            ${{ steps.evals.outputs.log-file }}
            ${{ steps.evals.outputs.timestamped-report-file }}
            ${{ steps.evals.outputs.timestamped-csv-file }}
            ${{ steps.prepare_spec.outputs.spec_path }}

      - name: Add summary to workflow
        shell: bash
        run: |
          {
            echo "## Multi-Agentspec Evals Report"
            echo ""
            echo "- Lane: \\`${{ matrix.run_environment }}\\`"
            echo "- Evalset spec: \\`${{ steps.prepare_spec.outputs.spec_path }}\\`"
            echo "- Agentspec ids: \\`${{ inputs.agentspec_ids }}\\`"
            echo "- Markdown report: \\`${{ steps.evals.outputs.report-file }}\\`"
            echo "- CSV report: \\`${{ steps.evals.outputs.csv-file }}\\`"
            echo "- Uploaded artifacts: \\`datalayer-evals-reports-${{ matrix.run_environment }}\\` and \\`datalayer-evals-final-reports-${{ matrix.run_environment }}\\`"
          } >> "$GITHUB_STEP_SUMMARY"
